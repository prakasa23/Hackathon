<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Fix My City</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #05070a; 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-box { 
            background: #1e293b; 
            padding: 40px; 
            border-radius: 25px; 
            border: 1px solid #334155; 
            width: 300px; 
            text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        h2 { margin-bottom: 20px; color: #00f2ff; }
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            border-radius: 12px; 
            background: #05070a; 
            border: 1px solid #334155; 
            color: white; 
            box-sizing: border-box; 
            outline: none;
        }
        input:focus { border-color: #00f2ff; }
        button { 
            background: #00f2ff; 
            color: #000; 
            border: none; 
            padding: 14px; 
            width: 100%; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px; 
            font-size: 1rem;
        }
        .back-link { 
            display: block; 
            margin-top: 20px; 
            color: #94a3b8; 
            text-decoration: none; 
            font-size: 0.8rem; 
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Admin Login</h2>
        <input type="text" id="userid" placeholder="User ID">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="checkLogin()">Access Panel</button>
        <a href="index.html" class="back-link">← Back to Dashboard</a>
    </div>

    <script>
        function checkLogin() {
            const u = document.getElementById('userid').value;
            const p = document.getElementById('pass').value;

            // Credentials check
            if(u === "admin" && p === "1234") {
                // Set a session variable so the Admin Panel knows you are logged in
                sessionStorage.setItem('isAdmin', 'true');
                window.location.href = "admin-panel.html";
            } else {
                alert("Invalid User ID or Password");
            }
        }
    </script>

</body>
</html>
