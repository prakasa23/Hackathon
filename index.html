<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix My City | Premium Urban Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #05070a; --accent: #00f2ff; --card: #1e293b; --text-dim: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: white; font-family: 'Poppins', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        .hero-section {
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(rgba(5, 7, 10, 0.6), rgba(5, 7, 10, 0.8)), 
                        url('https://images.unsplash.com/photo-1590059536065-9856a596001a?q=80&w=2000&auto=format&fit=crop');
            background-size: cover; background-position: center; perspective: 1000px;
        }

        .title-container { position: relative; display: flex; gap: 8px; z-index: 10; }
        .letter {
            display: inline-block; font-family: 'Russo One', sans-serif; font-size: clamp(2.5rem, 10vw, 6.5rem);
            color: #333; filter: sepia(1) saturate(3) contrast(0.8); 
            transform: translateY(40px) rotate(20deg) skewX(15deg); opacity: 0.7;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .tool-icon { position: absolute; font-size: 5rem; z-index: 50; opacity: 0; pointer-events: none; }
        .hammer { color: #cbd5e1; top: -150px; left: 45%; }
        .bolt { color: var(--accent); top: 50%; right: 10%; }
        .water-wave { position: absolute; top: 0; left: -100%; width: 150%; height: 100%; background: linear-gradient(90deg, transparent, rgba(0, 242, 255, 0.4), #fff, rgba(0, 242, 255, 0.4), transparent); z-index: 60; pointer-events: none; filter: blur(30px); }

        @keyframes hammerStrike { 0% { opacity: 1; transform: translateY(0); } 40% { transform: translateY(200px) rotate(-90deg); } 100% { opacity: 0; } }
        @keyframes boltZap { 0%, 100% { opacity: 0; transform: scale(0); } 50% { opacity: 1; transform: scale(1.8); } }
        @keyframes waveSlide { 0% { left: -150%; } 100% { left: 150%; } }

        .snap-fix .letter { transform: translateY(0) rotate(0deg) skewX(0deg); opacity: 1; color: #555; }
        .brighten .letter { color: #fff; text-shadow: 0 0 15px var(--accent); }
        .clean .letter { filter: sepia(0); color: white; text-shadow: 0 10px 25px rgba(0, 242, 255, 0.5); }

        .hero-content { margin-top: 40px; text-align: center; opacity: 0; transform: translateY(20px); transition: 0.8s ease-out; }
        .btn-start { background: var(--accent); color: #000; padding: 15px 40px; text-decoration: none; font-weight: 800; border-radius: 8px; display: inline-block; }

        .window-2 { min-height: 100vh; padding: 80px 5%; background: #0f172a; }
        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; max-width: 1300px; margin: 0 auto 50px; }
        .opt-card { padding: 60px 20px; border-radius: 40px; text-align: center; text-decoration: none; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .opt-card:hover { transform: translateY(-10px); filter: brightness(1.1); }
        .opt-card i { font-size: 65px; margin-bottom: 25px; }
        .opt-card span { font-weight: 700; font-size: 1.6rem; }

        .pothole { background: #fee2e2; color: #991b1b; }
        .garbage { background: #dcfce7; color: #166534; }
        .light { background: #fef9c3; color: #854d0e; }
        .drainage { background: #dbeafe; color: #1e40af; }
        .map-view { background: #e0e7ff; color: #3730a3; }
        
        .map-section-container { max-width: 1200px; margin: 0 auto; background: var(--card); padding: 25px; border-radius: 30px; display: none; }
        #map { height: 550px; width: 100%; border-radius: 20px; border: 1px solid #334155; margin-top: 15px; }
        .shake { animation: camShake 0.15s; }
        @keyframes camShake { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(5px,5px); } }
    </style>
</head>
<body id="body">
    <div class="hero-section">
        <i class="fa-solid fa-hammer tool-icon hammer" id="hammerIcon"></i>
        <i class="fa-solid fa-bolt tool-icon bolt" id="boltIcon"></i>
        <div class="water-wave" id="waterWave"></div>
        <div class="title-container" id="titleGroup">
            <span class="letter">F</span><span class="letter">I</span><span class="letter">X</span>
            <span class="letter" style="margin-left: 20px;">M</span><span class="letter">Y</span>
            <span class="letter" style="margin-left: 20px;">C</span><span class="letter">I</span><span class="letter">T</span><span class="letter">Y</span>
        </div>
        <div class="hero-content" id="heroContent">
            <p style="color: #cbd5e1; font-size: 1.2rem;">Official Infrastructure Command</p><br>
            <a href="#dashboard" class="btn-start">Access Dashboard</a>
        </div>
    </div>

    <div class="window-2" id="dashboard">
        <div class="options-grid">
            <a href="report.html?type=Pothole" class="opt-card pothole"><i class="fa-solid fa-road"></i><span>Potholes</span></a>
            <a href="report.html?type=Garbage" class="opt-card garbage"><i class="fa-solid fa-trash-can"></i><span>Waste</span></a>
            <a href="report.html?type=Street Light" class="opt-card light"><i class="fa-solid fa-lightbulb"></i><span>Lighting</span></a>
            <a href="report.html?type=Drainage" class="opt-card drainage"><i class="fa-solid fa-droplet"></i><span>Drainage</span></a>
            <a href="javascript:void(0)" class="opt-card map-view" onclick="activateMap()"><i class="fa-solid fa-map-location-dot"></i><span>Nearby Map</span></a>
        </div>
        <div class="map-section-container" id="mapSection">
            <div style="display:flex; justify-content: space-between; align-items:center;">
                <h3>Nearby Awareness (10km)</h3>
                <div style="display:flex; gap:15px; font-size: 0.8rem;">
                    <span><i class="fa-solid fa-circle" style="color:#ef4444"></i> Pending</span>
                    <span><i class="fa-solid fa-circle" style="color:#22c55e"></i> Solved</span>
                </div>
            </div>
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        window.addEventListener('load', () => {
            const tg = document.getElementById('titleGroup'), h = document.getElementById('hammerIcon'), 
                  b = document.getElementById('boltIcon'), w = document.getElementById('waterWave'),
                  c = document.getElementById('heroContent'), bd = document.getElementById('body');

            // ANIMATION SPEED REDUCED SLIGHTLY FOR PREMIUM FEEL
            setTimeout(() => { h.style.animation = "hammerStrike 0.8s forwards"; }, 600);
            setTimeout(() => { bd.classList.add('shake'); tg.classList.add('snap-fix'); }, 1000);
            setTimeout(() => { b.style.animation = "boltZap 0.7s forwards"; tg.classList.add('brighten'); }, 1800);
            setTimeout(() => { w.style.animation = "waveSlide 1.2s forwards"; }, 2600);
            setTimeout(() => { tg.classList.add('clean'); c.style.opacity = "1"; c.style.transform = "translateY(0)"; }, 3200);
        });

        let map;
        function activateMap() {
            document.getElementById('mapSection').style.display = "block";
            if (!map) {
                map = L.map('map').setView([13.0827, 80.2707], 13);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
                navigator.geolocation.getCurrentPosition(pos => {
                    const {latitude: lat, longitude: lng} = pos.coords;
                    map.setView([lat, lng], 13);
                    L.circle([lat, lng], {radius: 10000, color: '#00f2ff', fillOpacity: 0.1}).addTo(map);
                    L.marker([lat, lng]).addTo(map).bindPopup("You are here").openPopup();
                    
                    const issueTypes = ["Pothole", "Waste Leak", "Broken Lamp", "Flooded Drain"];
                    for(let i=0; i<10; i++) {
                        let isSolved = Math.random() > 0.5;
                        let type = issueTypes[Math.floor(Math.random() * issueTypes.length)];
                        L.circleMarker([lat + (Math.random()-0.5)*0.1, lng + (Math.random()-0.5)*0.1], {
                            radius: 9, fillColor: isSolved ? '#22c55e' : '#ef4444', color: '#fff', weight: 2, fillOpacity: 1
                        }).addTo(map).bindPopup(`<strong>${type}</strong><br>Status: ${isSolved ? 'Solved' : 'Pending'}`);
                    }
                });
            }
        }
    </script>
</body>
</html>
