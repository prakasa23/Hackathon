<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Center | Fix My City</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #05070a; color: white; display: flex; justify-content: center; padding: 30px; }
        .report-window {
            max-width: 600px; width: 100%; background: #1e293b; padding: 40px; 
            border-radius: 35px; border: 1px solid #334155; animation: slideUp 0.8s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        .badge { background: #00f2ff; color: #000; padding: 5px 20px; border-radius: 12px; font-weight: 700; margin-bottom: 20px; display: inline-block; }
        .form-group { margin-bottom: 25px; position: relative; }
        label { display: block; margin-bottom: 10px; color: #94a3b8; }
        input, textarea { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #334155; background: #05070a; color: white; }
        input:focus { border-color: #00f2ff; outline: none; }
        .btn-tool { background: #334155; color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; width: 100%; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .sug-box { position: absolute; width: 100%; background: white; color: black; border-radius: 12px; z-index: 100; max-height: 200px; overflow-y: auto; display: none; }
        .sug-box div { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; }
        .cam-box { width: 100%; height: 320px; background: #000; border-radius: 20px; overflow: hidden; display: none; position: relative; margin-bottom: 15px; border: 2px solid #00f2ff; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .snap { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); background: #00f2ff; color: #000; padding: 10px 25px; border-radius: 30px; border: none; font-weight: 700; }
        .preview { width: 100%; border-radius: 20px; display: none; margin-bottom: 15px; border: 2px solid #4ade80; }
        .btn-submit { width: 100%; padding: 18px; background: #00f2ff; color: #000; border: none; border-radius: 15px; font-weight: 700; font-size: 1.1rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="report-window">
    <div class="badge" id="typeTag">Issue</div>
    <h1>Incident Logging</h1>
    <p style="color: #94a3b8; margin-bottom: 30px;">Provide accurate location and evidence.</p>

    <div class="form-group">
        <label>Location Details (Tamil Nadu)</label>
        <button class="btn-tool" onclick="getGPS()"><i class="fa-solid fa-location-arrow"></i> Get Live GPS Location</button>
        <input type="text" id="locInp" placeholder="Type area or street name..." oninput="searchTN(this.value)">
        <div class="sug-box" id="sugBox"></div>
    </div>

    <div class="form-group">
        <label>Evidence (Live Camera Capture)</label>
        <button class="btn-tool" onclick="startCam()"><i class="fa-solid fa-camera"></i> Open Live Camera</button>
        <div class="cam-box" id="camWrap">
            <video id="video" autoplay playsinline></video>
            <button class="snap" onclick="snap()">TAKE PHOTO</button>
        </div>
        <canvas id="canvas" style="display:none;"></canvas>
        <img id="preview" class="preview">
    </div>

    <button class="btn-submit" onclick="alert('Report Filed Successfully!')">Send Official Report</button>
</div>

<script>
    const type = new URLSearchParams(window.location.search).get('type');
    document.getElementById('typeTag').innerText = type || "Civic Issue";

    function getGPS() {
        const inp = document.getElementById('locInp');
        inp.placeholder = "Finding GPS...";
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json`);
            const data = await res.json();
            inp.value = data.display_name;
        });
    }

    async function searchTN(q) {
        const box = document.getElementById('sugBox');
        if(q.length < 3) { box.style.display = 'none'; return; }
        const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${q}, Tamil Nadu&format=json&limit=5`);
        const data = await res.json();
        box.innerHTML = '';
        if(data.length > 0) {
            box.style.display = 'block';
            data.forEach(d => {
                const item = document.createElement('div');
                item.innerText = d.display_name;
                item.onclick = () => { document.getElementById('locInp').value = d.display_name; box.style.display = 'none'; };
                box.appendChild(item);
            });
        }
    }

    let stream;
    async function startCam() {
        document.getElementById('camWrap').style.display = 'block';
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video').srcObject = stream;
    }

    function snap() {
        const v = document.getElementById('video'), c = document.getElementById('canvas'), p = document.getElementById('preview');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        p.src = c.toDataURL('image/png');
        p.style.display = 'block';
        document.getElementById('camWrap').style.display = 'none';
        stream.getTracks().forEach(t => t.stop());
    }
</script>
</body>
</html>
